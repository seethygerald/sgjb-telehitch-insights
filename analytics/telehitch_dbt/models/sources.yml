version: 2

sources:
  - name: telegram_bronze
    description: Existing raw Telegram Delta table maintained by Airflow. dbt reads this table but never modifies it.
    database: "{{ var('raw_catalog') }}"
    schema: "{{ var('raw_schema') }}"
    quoting:
      database: true
      schema: true
      identifier: true
    tables:
      - name: messages
        identifier: "{{ var('raw_table') }}"
        columns:
          - name: channel
            data_tests: [not_null]
          - name: id
            data_tests: [not_null]
          - name: scraped_at_gmt8
            data_tests: [not_null]

  - name: telehitch_silver
    description: Silver lookup tables maintained outside dbt by Databricks notebooks.
    database: workspace
    schema: silver
    quoting:
      database: true
      schema: true
      identifier: true
    tables:
      - name: location_geocodes
        description: Reusable normalized-location geocode cache maintained by the OneMap notebook.
        identifier: location_geocodes
        columns:
          - name: normalized_location
            data_tests:
              - not_null
              - unique
          - name: resolution_status
            data_tests:
              - not_null
              - accepted_values:
                  arguments:
                    values: [resolved, no_match, ambiguous, error]
          - name: resolution_source
            data_tests:
              - not_null
              - accepted_values:
                  arguments:
                    values: [onemap, rule, override]
          - name: result_count
            data_tests: [not_null]
